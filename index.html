    '和觀眾說話，分享每首歌的故事或靈感。這能讓演出更有溫度，觀眾也更容易投入你的音樂世界！',
    '每次演出後，用錄影回顧自己的表現。看看哪個動作可以改善，哪個部分表現得很好，持續精進！',
    '完整排練是成功演出的保證。至少要把整場表演從頭到尾連貫排練三遍，讓每個細節都自然流暢！',
    '演出後和觀眾或表演者們討論彼此的感想。互相給予真誠的鼓勵和建設性的建議，一起成長！',
    '恭喜你完成了全部10頁的吉他教學！你的旅程才剛開始，每天彈奏、永遠學習、享受音樂！🎸🎉🌟'
  ]
];

/* ═══════════════════════════════════════════
   PAGE SYSTEM
═══════════════════════════════════════════ */
let currentPage = 0;

// ── Build all 10 lesson pages ──
function buildPages() {
  const wrap  = document.getElementById('pagesWrap');
  const cmtPg = document.getElementById('page-10');

  for (let p = 0; p < TOTAL_PAGES; p++) {
    const pg = document.createElement('div');
    pg.className = 'page';
    pg.id = `page-${p}`;

    // section label
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.style.marginTop = '8px';
    lbl.innerHTML = `<span>📸 ${PAGE_META[p]} ／ 共 ${TOTAL_PAGES} 頁</span>`;

    // lessons wrapper (10 cards)
    const lessonsDiv = document.createElement('div');
    lessonsDiv.className = 'lessons';

    for (let c = 0; c < CARDS_PER_PAGE; c++) {
      const globalIdx = p * CARDS_PER_PAGE + c;
      const folderNum = String(p + 1).padStart(2, '0');
      const fileNum   = String(c + 1).padStart(2, '0');
      const imgSrc    = `pic${folderNum}/pic_${fileNum}.jpg`;

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.page = p;
      card.dataset.card = c;
      card.dataset.gidx = globalIdx;

      card.innerHTML = `
        <div class="card-num">${c + 1}</div>
        <div class="card-photo" onclick="openLB(${p},${c})">
          <img src="${imgSrc}" alt="第${p+1}頁第${c+1}張"/>
          <div class="zoom-hint">🔍 點擊放大</div>
        </div>
        <div class="card-body">
          <div class="card-emoji">${CARD_EMOJIS[c]}</div>
          <input class="card-title-input"
            value="${DEFAULT_TITLES[p][c]}"
            placeholder="輸入課程標題…"/>
          <textarea class="card-desc" placeholder="在這裡輸入圖片說明…">${DEFAULT_DESCS[p][c]}</textarea>
          <span class="edit-hint">✏️ 點擊標題或說明可直接編輯</span>
        </div>`;

      lessonsDiv.appendChild(card);
    }

    // page nav buttons
    const navDiv = document.createElement('div');
    navDiv.className = 'page-nav';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'pnav-btn pnav-prev';
    prevBtn.textContent = p === 0 ? '第 1 頁' : `◀ 第 ${p} 頁`;
    prevBtn.disabled = (p === 0);
    if (p > 0) prevBtn.onclick = () => goPage(p - 1, -1);

    const ctr = document.createElement('span');
    ctr.className = 'page-counter';
    ctr.textContent = `${p + 1} / ${TOTAL_PAGES}`;

    const nextBtn = document.createElement('button');
    if (p < TOTAL_PAGES - 1) {
      nextBtn.className = 'pnav-btn pnav-next';
      nextBtn.textContent = `第 ${p + 2} 頁 ▶`;
      nextBtn.onclick = () => goPage(p + 1, 1);
    } else {
      nextBtn.className = 'pnav-btn pnav-comment';
      nextBtn.textContent = '💬 學習心得';
      nextBtn.onclick = () => goPage(10, 1);
    }

    navDiv.appendChild(prevBtn);
    navDiv.appendChild(ctr);
    navDiv.appendChild(nextBtn);

    pg.appendChild(lbl);
    pg.appendChild(lessonsDiv);
    pg.appendChild(navDiv);

    wrap.insertBefore(pg, cmtPg);
  }
}

// ── Navigate ──
function goPage(idx, dir) {
  const old = document.getElementById(`page-${currentPage}`);
  if (old) old.classList.remove('active', 'from-left');

  currentPage = idx;
  const pg = document.getElementById(`page-${currentPage}`);
  if (!pg) return;

  pg.classList.remove('from-left');
  if (dir < 0) pg.classList.add('from-left');
  pg.classList.add('active');

  window.scrollTo({ top: 0, behavior: 'smooth' });

  // staggered card fly-in
  if (currentPage < TOTAL_PAGES) {
    const cards = pg.querySelectorAll('.card');
    cards.forEach(c => c.classList.remove('visible'));
    cards.forEach((c, i) => setTimeout(() => c.classList.add('visible'), 60 + i * 60));
  }

  updateNav();
}

// ── Update nav dots & progress ──
function updateNav() {
  const dots = document.querySelectorAll('#navDots .nav-dot');
  dots.forEach((dot, i) => {
    dot.classList.remove('active', 'visited');
    const dotPage = (i < TOTAL_PAGES) ? i : TOTAL_PAGES;
    if (dotPage === currentPage)    dot.classList.add('active');
    else if (dotPage < currentPage) dot.classList.add('visited');
  });
  const pct = currentPage >= TOTAL_PAGES ? 100 : Math.round((currentPage / TOTAL_PAGES) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

/* ═══════════════════════════════════════════
   FIREBASE – 載入 / 儲存 / 多人同步
   Data layout: data.pages[p][c] = { title, desc }
═══════════════════════════════════════════ */

// Get a specific card element from the DOM
function getCardEl(p, c) {
  return document.querySelector(`#page-${p} .card[data-card="${c}"]`);
}

async function loadData() {
  const snap = await db.collection("guitar").doc("main").get();
  const data = snap.data();
  if (!data || !data.pages) return;

  for (let p = 0; p < TOTAL_PAGES; p++) {
    for (let c = 0; c < CARDS_PER_PAGE; c++) {
      if (data.pages[p] && data.pages[p][c]) {
        const card = getCardEl(p, c);
        if (!card) continue;
        card.querySelector('.card-title-input').value = data.pages[p][c].title;
        card.querySelector('.card-desc').value         = data.pages[p][c].desc;
      }
    }
  }
  if (data.comment) document.getElementById('commentBox').value = data.comment;
}

async function saveCard(p, c, titleVal, descVal) {
  const snap       = await db.collection("guitar").doc("main").get();
  let   data       = snap.data() || {};
  data.pages       = data.pages || {};
  data.pages[p]    = data.pages[p] || {};
  data.pages[p][c] = { title: titleVal, desc: descVal };
  await db.collection("guitar").doc("main").set(data);
  showToast('☁️ 已同步到雲端！');
}

// Attach save listeners (called after buildPages)
function attachCardSave() {
  document.querySelectorAll('#pagesWrap .card').forEach(card => {
    const p  = parseInt(card.dataset.page);
    const c  = parseInt(card.dataset.card);
    const ti = card.querySelector('.card-title-input');
    const da = card.querySelector('.card-desc');
    [ti, da].forEach(el => {
      el.addEventListener('blur', () => saveCard(p, c, ti.value, da.value));
    });
  });
}

// 多人即時同步
db.collection("guitar").doc("main").onSnapshot(snap => {
  const data = snap.data();
  if (!data || !data.pages) return;
  for (let p = 0; p < TOTAL_PAGES; p++) {
    for (let c = 0; c < CARDS_PER_PAGE; c++) {
      if (data.pages[p] && data.pages[p][c]) {
        const card = getCardEl(p, c);
        if (!card) continue;
        card.querySelector('.card-title-input').value = data.pages[p][c].title;
        card.querySelector('.card-desc').value         = data.pages[p][c].desc;
      }
    }
  }
  if (data.comment) document.getElementById('commentBox').value = data.comment;
});

async function saveComment() {
  const snap   = await db.collection("guitar").doc("main").get();
  let   data   = snap.data() || {};
  data.comment = document.getElementById('commentBox').value;
  await db.collection("guitar").doc("main").set(data);
  showToast('☁️ 心得已雲端同步！');
}
function clearComment() { document.getElementById('commentBox').value = ''; }

/* ═══════════════════════════════════════════
   LIGHTBOX
   Each page has its own 10 images
═══════════════════════════════════════════ */
let lbPage = 0, lbCur = 0;

function openLB(p, c) {
  lbPage = p; lbCur = c;
  showLB();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function showLB() {
  const folderNum = String(lbPage + 1).padStart(2, '0');
  const fileNum   = String(lbCur  + 1).padStart(2, '0');
  document.getElementById('lb-img').src = `pic${folderNum}/pic_${fileNum}.jpg`;
  document.getElementById('lb-info').textContent =
    `第 ${lbPage+1} 頁  ·  第 ${lbCur+1} 張  ·  ${lbCur+1} / ${CARDS_PER_PAGE}`;
}
function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function closeLBOutside(e) { if (e.target===document.getElementById('lightbox')) closeLB(); }
function nextLB() { lbCur = (lbCur + 1) % CARDS_PER_PAGE; showLB(); }
function prevLB() { lbCur = (lbCur - 1 + CARDS_PER_PAGE) % CARDS_PER_PAGE; showLB(); }
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') nextLB();
  if (e.key === 'ArrowLeft')  prevLB();
  if (e.key === 'Escape')     closeLB();
});

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
buildPages();
goPage(0, 1);
attachCardSave();
loadData();
</script>

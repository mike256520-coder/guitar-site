<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大家的音樂筆記</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- 
	
-->
    <style>
	
       /* 📱 手機版 RWD 優化 */
:root { 
    --p-color: #4a90e2; 
    --bg: #f5f7fa; 
    --card-bg: #ffffff; 
}

body { 
    font-family: 'Segoe UI', system-ui, sans-serif; 
    background: var(--bg); 
    margin: 0; 
    padding: 10px; /* 手機版邊距縮小，增加空間 */
    color: #333; 
}

header h1 { 
    font-size: 1.5rem; /* 縮小手機標題 */
    margin-top: 15px;
}

    /* 🧭 導覽列：改成手機橫向滑動（核心改動） */
nav { 
    display: flex; 
    flex-wrap: nowrap; /* 強制不換行 */
    overflow-x: auto;  /* 允許左右滑動 */
    -webkit-overflow-scrolling: touch; /* 讓 iOS 滑動更順暢 */
    gap: 10px; 
    padding: 10px 5px;
    margin-bottom: 20px; 
    position: sticky; 
    top: 0; 
    z-index: 100;
    background: var(--bg); /* 滑動時背景不透明 */
}

/* 隱藏捲軸（美化） */
nav::-webkit-scrollbar { display: none; }

nav button { 
    flex: 0 0 auto; /* 防止按鈕被壓縮 */
    padding: 8px 20px; 
    border-radius: 25px; 
    white-space: nowrap; /* 文字不折行 */
    border: none;
    background: #e0e0e0;
}

/* 📦 卡片網格：手機一排一個，平板以上一排多個 */
.card-grid { 
    display: grid; 
    grid-template-columns: 1fr; /* 預設一排一張 */
    gap: 15px; 
    max-width: 1200px; 
    margin: 0 auto; 
}

/* 當螢幕寬度大於 600px (平板) */
@media (min-width: 600px) {
    .card-grid { grid-template-columns: repeat(2, 1fr); }
}

/* 當螢幕寬度大於 1000px (電腦) */
@media (min-width: 1000px) {
    .card-grid { grid-template-columns: repeat(3, 1fr); }
}

/* 📝 輸入區域優化 */
.card-body { padding: 20px; } /* 增加點擊空間 */
.card-title-input { font-size: 1.2rem; }
.card-desc { 
    font-size: 1rem; /* 手機輸入框字體不能小於 16px (1rem)，否則 iOS 會自動放大畫面 */
    height: 100px; 
}

.save-card-btn { 
    padding: 12px; /* 按鈕加高，方便手指點擊 */
    font-size: 1rem;
}

/* 🔒 密碼畫面優化 */
#auth-overlay input {
    width: 60%;
    font-size: 1.2rem;
}

/* 🖼️ Lightbox 在手機上全螢幕 */
#lb-img { 
    width: 100%; 
    height: auto; 
}
    </style>
</head>
<body>

<!-- 輸入密碼格 -->
<div id="auth-overlay" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#1a252f; z-index:10000; display:flex; justify-content:center; align-items:center; flex-direction:column; color:white; padding:20px; box-sizing:border-box;">
    <div style="text-align:center; width:100%; max-width:300px;">
        <h2 style="margin-bottom:20px; font-size:1.4rem;">🔒 音樂筆記本已鎖定</h2>
        <input type="password" id="pw-input" placeholder="請輸入密碼" 
               style="width:100%; padding:15px; border-radius:10px; border:none; outline:none; font-size:1.2rem; margin-bottom:15px; box-sizing:border-box; text-align:center;">
        <button onclick="checkPassword()" 
                style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:10px; cursor:pointer; font-size:1.1rem; font-weight:bold;">
            開啟筆記本
        </button>
        <p id="pw-error" style="color:#ff6b6b; margin-top:15px; display:none; font-weight:bold;">密碼錯誤，請再試一次</p>
    </div>
</div>


<header>
    <h1>🎵 大家的音樂筆記</h1>
    <p>點進去加入心得 · 雲端即時同步</p>
</header>

<nav id="nav-bar"></nav>
<main id="main-content"></main>

<div class="comment-section">
    <h3>📝 總結與學習心得</h3>
    <textarea id="commentBox" placeholder="在這裡寫下整體的學習狀況..."></textarea>
    <button class="save-btn" onclick="saveComment()">儲存心得</button>
</div>

<div id="lightbox" onclick="closeLB()">
    <img id="lb-img" src="">
</div>
<div id="toast" class="toast">已儲存</div>


<!--  設定你的密碼-->
<script>

const ACCESS_PASSWORD = "999"; // 👈 在這裡設定你的密碼

function checkPassword() {
    const input = document.getElementById('pw-input').value;
    const overlay = document.getElementById('auth-overlay');
    const errorMsg = document.getElementById('pw-error');

    if (input === ACCESS_PASSWORD) {
        // 密碼正確：移除遮罩
        overlay.style.display = 'none';
        // 儲存一個「已登入」狀態在瀏覽器中（下次重整不用再輸入，選用）
        sessionStorage.setItem('isLoggedIn', 'true');
    } else {
        // 密碼錯誤：顯示紅字並清空輸入框
        errorMsg.style.display = 'block';
        document.getElementById('pw-input').value = '';
    }
}

// 支援按「Enter」鍵直接登入
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.getElementById('auth-overlay').style.display !== 'none') {
        checkPassword();
    }
});


// ═══════════════════════════════════════════
// 1. 請在此填入你的 Firebase 新專案資訊 (必填)
//apiKey: "AIzaSyCxnUafd_whtgo2PYK-CreTYi6WBIwt5i8",
  //authDomain: "music-note-c67cd.firebaseapp.com",
  //projectId: "music-note-c67cd",
// ═══════════════════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyCxnUafd_whtgo2PYK-CreTYi6WBIwt5i8",
    authDomain: "music-note-c67cd.firebaseapp.com",
    projectId: "music-note-c67cd"
};
// ═══════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const PAGE_NAMES = ["樂理基礎", "節奏訓練", "音階練習", "和聲分析", "曲目練習A", "曲目練習B", "創作靈感", "聽力訓練", "大師課筆記", "演出準備"];
const CARD_EMOJIS = ["🎵", "🎹", "🎼", "🎻", "🎷", "🎸", "🎺", "🎧", "🎤", "✨"];
const TOTAL_PAGES = 10;
const CARDS_PER_PAGE = 10;

// 初始化頁面與卡片
function init() {
    const nav = document.getElementById('nav-bar');
    const main = document.getElementById('main-content');
    
    for(let p=0; p<TOTAL_PAGES; p++) {
        // 生成按鈕
        const btn = document.createElement('button');
        btn.textContent = PAGE_NAMES[p];
        btn.onclick = () => switchPage(p);
        btn.id = `nav-btn-${p}`;
        nav.appendChild(btn);
        
        // 生成頁面容器
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page-content';
        pageDiv.id = `page-${p}`;
        
        const grid = document.createElement('div');
        grid.className = 'card-grid';
        
        for(let c=0; c<CARDS_PER_PAGE; c++) {
            const folderNum = String(p + 1).padStart(2, '0');
            const fileNum   = String(c + 1).padStart(2, '0');
            
            grid.innerHTML += `
                <div class="card" data-card="${c}">
                    <div class="card-img-container" onclick="openLB(${p}, ${c})">
                        <img src="pic${folderNum}/pic_${fileNum}.jpg" onerror="this.src='https://via.placeholder.com/300x170?text=Music+${c+1}'">
                        <div style="position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.8); padding:2px 8px; border-radius:10px; font-size:12px;">
                            ${CARD_EMOJIS[c]} No.${c+1}
                        </div>
                    </div>
                    <div class="card-body">
                        <input type="text" class="card-title-input" placeholder="輸入練習曲目/主題...">
                        <textarea class="card-desc" placeholder="輸入進度或筆記..."></textarea>
                        <button class="save-card-btn" onclick="saveCard(${p}, ${c})">💾 單張儲存</button>
                    </div>
                </div>`;
        }
        pageDiv.appendChild(grid);
        main.appendChild(pageDiv);
    }
    switchPage(0);
    loadData();
    listenUpdates();
}

function switchPage(idx) {
    document.querySelectorAll('.page-content, nav button').forEach(el => el.classList.remove('active'));
    document.getElementById(`page-${idx}`).classList.add('active');
    document.getElementById(`nav-btn-${idx}`).classList.add('active');
}

function getCardEl(p, c) { return document.querySelector(`#page-${p} .card[data-card="${c}"]`); }

// Firebase 讀取
async function loadData() {
    const snap = await db.collection("music_notebook").doc("main").get();
    const data = snap.data();
    if (!data) return;
    
    if (data.pages) {
        for(let p in data.pages) {
            for(let c in data.pages[p]) {
                const card = getCardEl(p, c);
                if(card) {
                    card.querySelector('.card-title-input').value = data.pages[p][c].title || "";
                    card.querySelector('.card-desc').value = data.pages[p][c].desc || "";
                }
            }
        }
    }
    if (data.comment) document.getElementById('commentBox').value = data.comment;
}

// Firebase 儲存卡片
function saveCard(p, c) {
    const card = getCardEl(p, c);
    const title = card.querySelector('.card-title-input').value;
    const desc = card.querySelector('.card-desc').value;
    
    db.collection("music_notebook").doc("main").set({
        pages: { [p]: { [c]: { title, desc } } }
    }, { merge: true }).then(() => showToast("已同步到雲端！"));
}

// 儲存總心得
function saveComment() {
    const val = document.getElementById('commentBox').value;
    db.collection("music_notebook").doc("main").set({ comment: val }, { merge: true })
      .then(() => showToast("總心得儲存成功！"));
}

// 即時監聽 (多裝置同步關鍵)
function listenUpdates() {
    db.collection("music_notebook").doc("main").onSnapshot(snap => {
        const data = snap.data();
        if(!data) return;
        // 這裡可以實作即時更新邏輯，讓另一台電腦也同步跳字
    });
}

function openLB(p, c) {
    const folderNum = String(p + 1).padStart(2, '0');
    const fileNum   = String(c + 1).padStart(2, '0');
    document.getElementById('lb-img').src = `pic${folderNum}/pic_${fileNum}.jpg`;
    document.getElementById('lightbox').classList.add('open');
}
function closeLB() { document.getElementById('lightbox').classList.remove('open'); }

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = "1";
    setTimeout(() => t.style.opacity = "0", 2000);
}

//原始程式 window.onload = init;(修改成再登入不用打密碼)
const ACCESS_PASSWORD = "你的密碼"; 

window.onload = function() {
    // 1. 先執行 UI 生成（卡片等）
    try {
        init(); 
    } catch (e) {
        console.error("初始化失敗:", e);
    }

    // 2. 檢查密碼狀態
    const overlay = document.getElementById('auth-overlay');
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        overlay.style.display = 'none';
    } else {
        // 強制確保遮罩是顯示的，且在最上層
        overlay.style.display = 'flex';
    }
};

function checkPassword() {
    const input = document.getElementById('pw-input').value;
    const overlay = document.getElementById('auth-overlay');
    const errorMsg = document.getElementById('pw-error');

    if (input === ACCESS_PASSWORD) {
        overlay.style.display = 'none';
        sessionStorage.setItem('isLoggedIn', 'true');
        // 密碼正確後，稍微捲動一下頁面，解決部分手機瀏覽器渲染殘留問題
        window.scrollTo(0, 0);
    } else {
        errorMsg.style.display = 'block';
        document.getElementById('pw-input').value = '';
        // 震動回饋 (手機支援的話)
        if (navigator.vibrate) navigator.vibrate(200);
    }
}


</script>
</body>
</html>
